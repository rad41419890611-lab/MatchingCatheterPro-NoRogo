<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Matching Catheter Pro — Launch</title>
<style>
:root{color-scheme:dark}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;background:radial-gradient(circle at 50% 0%,#13243a 0%,#0a0e14 60%);color:#e2eaf5;min-height:100vh;padding:32px 18px 64px}
.wrap{max-width:520px;margin:0 auto}
.brand{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.brand img{width:64px;height:64px;border-radius:16px;box-shadow:0 8px 28px rgba(0,0,0,.45)}
.brand h1{font-size:1.6rem;line-height:1.2;font-weight:800}
.brand small{display:block;font-size:.62rem;letter-spacing:.18em;color:#7ca3c6;text-transform:uppercase;margin-bottom:4px}
.card{background:rgba(17,24,36,.85);border:1px solid #1e2d3d;border-radius:18px;padding:22px 20px;backdrop-filter:blur(10px);margin-top:14px}
.card h2{font-size:.7rem;letter-spacing:.16em;color:#00d4ff;text-transform:uppercase;margin-bottom:10px}
.card p{font-size:.92rem;line-height:1.85;color:#a7bdd2}
.btn{display:block;width:100%;text-align:center;padding:14px 18px;border-radius:12px;background:#00d4ff;color:#06121c;font-weight:800;text-decoration:none;font-size:1rem;margin-top:18px}
.btn.alt{background:transparent;color:#7ec9ea;border:1px solid #2a4060;font-weight:600}
.note{font-size:.72rem;color:#5a7a9a;line-height:1.8;margin-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <img src="./apple-touch-icon.png" alt="icon">
    <div>
      <small>iOS-style standalone web app</small>
      <h1>Matching Catheter Pro</h1>
    </div>
  </div>
  <div class="card">
    <h2>Launch experience</h2>
    <p>このページはホーム画面追加用のランチ案内です。本体ツールは下のボタンから起動してください。</p>
    <a class="btn" href="./index.html">本体ツールを開く</a>
    <a class="btn alt" href="./apple-touch-icon.png" download>アイコン画像を保存</a>
    <p class="note">iPhone / iPad は共有メニューから「ホーム画面に追加」、Android は「ホーム画面に追加」または「インストール」を利用してください。ホーム画面から起動するとフルスクリーンの standalone モードで動作します。</p>
  </div>
</div>
</body>
</html>
